naftiko: 1.0.0-alpha2
info:
  label: AIMLAPI AI/ML API Documentation — Voice
  description: 'AIMLAPI AI/ML API Documentation — Voice. 2 operations. Lead operation: AIMLAPI Speech to Text. Self-contained
    Naftiko capability covering one Aimlapi business surface.'
  tags:
  - Aimlapi
  - Voice
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AIMLAPI_API_KEY: AIMLAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: aimlapi-voice
    baseUri: http://{{baseurl}}
    description: AIMLAPI AI/ML API Documentation — Voice business capability. Self-contained, no shared references.
    resources:
    - name: stt
      path: /stt
      operations:
      - name: post
        method: POST
        description: AIMLAPI Speech to Text
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: tts
      path: /tts
      operations:
      - name: post
        method: POST
        description: AIMLAPI Text to Speech
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.AIMLAPI_API_KEY}}'
  exposes:
  - type: rest
    namespace: aimlapi-voice-rest
    port: 8080
    description: REST adapter for AIMLAPI AI/ML API Documentation — Voice. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/stt
      name: stt
      description: REST surface for stt.
      operations:
      - method: POST
        name: post
        description: AIMLAPI Speech to Text
        call: aimlapi-voice.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tts
      name: tts
      description: REST surface for tts.
      operations:
      - method: POST
        name: post
        description: AIMLAPI Text to Speech
        call: aimlapi-voice.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: aimlapi-voice-mcp
    port: 9090
    transport: http
    description: MCP adapter for AIMLAPI AI/ML API Documentation — Voice. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: aimlapi-speech-text
      description: AIMLAPI Speech to Text
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: aimlapi-voice.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: aimlapi-text-speech
      description: AIMLAPI Text to Speech
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: aimlapi-voice.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
